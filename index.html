<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zap48 Coded Lyrics Maker</title>
    <style>
        :root {
            --zap-green: #25D366;
            --bg-dark: #0b141a;
            --bg-panel: #111b21;
            --bg-input: #2a3942;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: #e9edef;
            text-align: center;
            margin: 0; padding: 20px;
        }
        
        h1 { color: var(--zap-green); text-shadow: 0 0 10px rgba(37, 211, 102, 0.3); margin-bottom: 5px; }
        
        .panel {
            background-color: var(--bg-panel); padding: 20px;
            border-radius: 12px; margin: 0 auto 20px auto;
            max-width: 1000px; text-align: left;
            border: 1px solid #222d34; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        h3 { color: var(--zap-green); margin-top: 0; margin-bottom: 15px; }

        /* Controles Superiores */
        .top-controls { display: flex; gap: 20px; margin-bottom: 20px; }
        .control-group { flex: 1; background: var(--bg-dark); padding: 15px; border-radius: 8px; border-left: 4px solid var(--zap-green); }
        
        textarea {
            width: 100%; height: 80px; background: var(--bg-input); color: white;
            border: 1px solid #222d34; border-radius: 6px; padding: 10px; box-sizing: border-box; resize: vertical;
        }

        .radio-group { display: flex; gap: 15px; margin-top: 10px; }
        .radio-group label { cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* Linhas da Letra */
        .lyric-row {
            display: flex; gap: 10px; margin-bottom: 15px; align-items: center;
            background-color: var(--bg-dark); padding: 12px; border-radius: 8px; border-left: 4px solid var(--zap-green);
        }

        input[type="text"] {
            padding: 10px; border-radius: 6px; border: 1px solid transparent;
            background-color: var(--bg-input); color: #e9edef; font-size: 14px; transition: 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--zap-green); }

        .file-upload {
            background-color: var(--bg-input); color: #8696a0; border-radius: 6px;
            padding: 10px; cursor: pointer; width: 130px; text-align: center;
            font-size: 14px; border: 1px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .file-upload:hover { border-color: var(--zap-green); }
        input[type="file"] { display: none; }
        input[type="color"] { padding: 0; width: 42px; height: 42px; cursor: pointer; border: none; border-radius: 50%; }
        
        button { font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; border: none; }
        .btn-add { background-color: var(--bg-input); color: var(--zap-green); padding: 10px 15px; border: 1px solid var(--zap-green); margin-top: 10px;}
        .btn-add:hover { background-color: var(--zap-green); color: #000; }
        .btn-remove { background-color: #f15c6d; color: white; padding: 10px 15px; }
        .btn-record {
            background-color: var(--zap-green); color: #0b141a; padding: 15px 40px; font-size: 20px;
            border-radius: 30px; margin-top: 10px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }
        .btn-record:hover { background-color: #21c05b; transform: translateY(-2px); }
        .btn-record:disabled { background-color: var(--bg-input); color: #8696a0; cursor: not-allowed; transform: none; }

        canvas { background-color: #000; border: 2px solid #222d34; border-radius: 10px; max-height: 40vh; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Zap48 Coded Lyrics Maker 🎤💚</h1>
    <p style="color: #8696a0; margin-top: 0;">Importe letras, escolha o formato e grave com música de fundo!</p>
    
    <div class="panel">
        <div class="top-controls">
            <div class="control-group">
                <h3>⚙️ Configurações</h3>
                <div class="radio-group">
                    <label><input type="radio" name="format" value="canva" checked onchange="atualizarFormato()"> Canva (9:16)</label>
                    <label><input type="radio" name="format" value="yt" onchange="atualizarFormato()"> YouTube (16:9)</label>
                </div>
                <br>
                <label class="file-upload" for="bg-media" style="display: block; width: auto;">
                    <span id="bg-label">🎵 Escolher Música ou Vídeo de Fundo...</span>
                </label>
                <input type="file" id="bg-media" accept="audio/*, video/*" onchange="carregarMidiaFundo(this)">
            </div>

            <div class="control-group">
                <h3>📝 Importar Letras</h3>
                <textarea id="import-text" placeholder="Cole aqui no formato:&#10;Sakura: I remember the day&#10;Chaewon: When we first met"></textarea>
                <button class="btn-add" onclick="importarLetras()">Importar</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>Painel de Letras 📝</h3>
        <div id="lyrics-list"></div>
        <button class="btn-add" onclick="adicionarLinha()">+ Adicionar Linha Vazia</button>
    </div>

    <button id="startBtn" class="btn-record" onclick="iniciarGravacao()">Gravar Vídeo</button>
    <br>
    
    <canvas id="videoCanvas" width="1080" height="1920"></canvas>

    <script>
        const lyricsList = document.getElementById('lyrics-list');
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let mediaRecorder;
        let recordedChunks = [];
        let startTime = null;
        let animationFrameId;
        let activeLyrics = [];
        let maxVideoTime = 0;
        
        let bgMediaElement = null; // Elemento de áudio ou vídeo global
        let audioContext = null;

        // --- FUNÇÕES DE SETUP ---

        function atualizarFormato() {
            const formato = document.querySelector('input[name="format"]:checked').value;
            if (formato === 'yt') {
                canvas.width = 1920; canvas.height = 1080;
            } else {
                canvas.width = 1080; canvas.height = 1920;
            }
        }

        function carregarMidiaFundo(input) {
            const file = input.files[0];
            if (!file) return;
            
            document.getElementById('bg-label').innerText = file.name;
            document.getElementById('bg-label').style.color = 'var(--zap-green)';

            const isVideo = file.type.startsWith('video');
            bgMediaElement = document.createElement(isVideo ? 'video' : 'audio');
            bgMediaElement.src = URL.createObjectURL(file);
            if (isVideo) {
                bgMediaElement.muted = false;
                bgMediaElement.playsInline = true;
            }
        }

        // --- FUNÇÕES DO EDITOR ---

        function handleFileUpload(input) {
            const row = input.closest('.lyric-row');
            const file = input.files[0];
            const label = row.querySelector('.file-upload-label');
            if (file && file.type.startsWith('image/')) {
                label.innerText = "Foto OK ✓"; label.style.color = 'var(--zap-green)';
            }
        }

        function adicionarLinha(memberStr = '', textStr = '') {
            const rowId = `row-${Date.now()}-${Math.floor(Math.random()*1000)}`;
            const row = document.createElement('div');
            row.className = 'lyric-row';
            row.innerHTML = `
                <label class="file-upload" for="file-${rowId}"><span class="file-upload-label">Foto...</span></label>
                <input type="file" id="file-${rowId}" class="input-file" accept="image/png, image/jpeg" onchange="handleFileUpload(this)">
                <input type="color" class="input-color" value="#25D366" title="Cor do Nome">
                <input type="text" class="input-member" placeholder="Membro" value="${memberStr}" style="width: 100px;">
                <input type="text" class="input-text" placeholder="Letra da música..." value="${textStr}" style="flex-grow: 1;">
                <input type="text" class="input-start" placeholder="00:00" style="width: 50px;" title="Início">
                <span style="color: #8696a0;">até</span>
                <input type="text" class="input-end" placeholder="00:00" style="width: 50px;" title="Fim">
                <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            lyricsList.appendChild(row);
        }

        function importarLetras() {
            const text = document.getElementById('import-text').value;
            const linhas = text.split('\n');
            let adicionou = false;
            linhas.forEach(linha => {
                if(!linha.trim()) return;
                const partes = linha.split(':');
                if(partes.length >= 2) {
                    const membro = partes[0].trim();
                    const letra = partes.slice(1).join(':').trim();
                    adicionarLinha(membro, letra);
                    adicionou = true;
                }
            });
            if(adicionou) document.getElementById('import-text').value = ''; // limpa após importar
        }

        function converterTempoParaMs(tempoString) {
            if (!tempoString || !tempoString.includes(':')) return 0;
            const partes = tempoString.split(':');
            const minutos = parseInt(partes[0], 10) || 0;
            const segundos = parseFloat(partes[1]) || 0; // aceita 00:00.5 agora
            return (minutos * 60 + segundos) * 1000;
        }

        function carregarImagemDoArquivo(file) {
            return new Promise((resolve) => {
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function capturarLetras() {
            const linhas = document.querySelectorAll('.lyric-row');
            const array = [];
            maxVideoTime = 0;

            for (const linha of linhas) {
                const member = linha.querySelector('.input-member').value;
                const text = linha.querySelector('.input-text').value;
                const color = linha.querySelector('.input-color').value;
                const start = converterTempoParaMs(linha.querySelector('.input-start').value);
                const end = converterTempoParaMs(linha.querySelector('.input-end').value);
                const fotoFile = linha.querySelector('.input-file').files[0];

                if (member && text) {
                    const fotoElement = await carregarImagemDoArquivo(fotoFile);
                    array.push({ member, text, color, start, end, fotoElement });
                    if (end > maxVideoTime) maxVideoTime = end;
                }
            }
            // Se tiver áudio/vídeo, o vídeo vai até o fim da música ou das letras, o que for maior
            if(bgMediaElement && bgMediaElement.duration) {
                 maxVideoTime = Math.max(maxVideoTime, bgMediaElement.duration * 1000);
            }
            return array;
        }

        // --- RENDERIZAÇÃO E GRAVAÇÃO ---

        function drawFrame(timestamp) {
            if (!startTime) startTime = timestamp;
            const tempoAtual = timestamp - startTime; 

            const formato = document.querySelector('input[name="format"]:checked').value;
            const isYT = formato === 'yt';

            // Desenha Fundo
            ctx.fillStyle = '#0b141a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha Vídeo de Fundo (se houver e estiver tocando)
            if (bgMediaElement && bgMediaElement.tagName === 'VIDEO' && !bgMediaElement.paused) {
                // Preenche a tela toda mantendo a proporção (cover)
                const vidRatio = bgMediaElement.videoWidth / bgMediaElement.videoHeight;
                const canvasRatio = canvas.width / canvas.height;
                let drawW = canvas.width, drawH = canvas.height, drawX = 0, drawY = 0;
                
                if (canvasRatio > vidRatio) {
                    drawH = canvas.width / vidRatio; drawY = (canvas.height - drawH) / 2;
                } else {
                    drawW = canvas.height * vidRatio; drawX = (canvas.width - drawW) / 2;
                }
                ctx.drawImage(bgMediaElement, drawX, drawY, drawW, drawH);
                
                // Overlay escuro para a letra aparecer melhor
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0,0, canvas.width, canvas.height);
            }

            // Verifica qual letra mostrar
            let linhaAtual = null;
            for (let i = 0; i < activeLyrics.length; i++) {
                if (tempoAtual >= activeLyrics[i].start && tempoAtual <= activeLyrics[i].end) {
                    linhaAtual = activeLyrics[i]; break;
                }
            }

            if (linhaAtual) {
                // Configurações baseadas no formato
                const targetSize = isYT ? 500 : 600; // Tamanho da foto
                const targetX = isYT ? 200 : (canvas.width - targetSize) / 2;
                const targetY = isYT ? (canvas.height - targetSize) / 2 : 400;

                // Desenha a Foto
                if (linhaAtual.fotoElement) {
                    const img = linhaAtual.fotoElement;
                    const imgRatio = img.width / img.height;
                    let finalW = targetSize, finalH = targetSize;

                    if (imgRatio > 1) { finalH = targetSize / imgRatio; } 
                    else { finalW = targetSize * imgRatio; }

                    const finalX = targetX + (targetSize - finalW) / 2;
                    const finalY = targetY + (targetSize - finalH) / 2;

                    ctx.drawImage(img, finalX, finalY, finalW, finalH);
                } else {
                    ctx.fillStyle = linhaAtual.color;
                    ctx.fillRect(targetX, targetY, targetSize, targetSize); 
                }

                // Desenha Textos
                ctx.fillStyle = linhaAtual.color;
                ctx.textAlign = isYT ? 'left' : 'center';
                
                const textX = isYT ? targetX + targetSize + 100 : canvas.width / 2;
                const nameY = isYT ? targetY + 200 : targetY + targetSize + 150;
                const lyricY = isYT ? nameY + 120 : nameY + 100;

                // Sombra no texto
                ctx.shadowColor = "black"; ctx.shadowBlur = 10; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;

                ctx.font = 'bold 80px sans-serif';
                ctx.fillText(linhaAtual.member, textX, nameY);

                ctx.fillStyle = '#ffffff';
                ctx.font = '60px sans-serif';
                ctx.fillText(linhaAtual.text, textX, lyricY);
                
                // Reseta sombra
                ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
            }

            if (tempoAtual > maxVideoTime + 500) {
                pararGravacao(); return;
            }

            animationFrameId = requestAnimationFrame(drawFrame);
        }

        async function iniciarGravacao() {
            startBtn.disabled = true; startBtn.innerText = "Preparando...";
            activeLyrics = await capturarLetras();
            
            if (activeLyrics.length === 0 && !bgMediaElement) {
                alert("Adicione letras ou uma música de fundo!");
                startBtn.disabled = false; startBtn.innerText = "Gravar Vídeo"; return;
            }

            recordedChunks = []; startTime = null;
            startBtn.innerText = "Gravando Timeline... Não feche a página!";

            // Captura o vídeo do Canvas
            const canvasStream = canvas.captureStream(30);
            let finalTracks = [...canvasStream.getVideoTracks()];

            // Mix de Áudio (Junta o áudio do media upload na gravação)
            if (bgMediaElement) {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Evita criar multiplos sources se gravar 2 vezes
                if(!bgMediaElement.sourceNode) {
                    bgMediaElement.sourceNode = audioContext.createMediaElementSource(bgMediaElement);
                }
                
                const dest = audioContext.createMediaStreamDestination();
                bgMediaElement.sourceNode.connect(dest);
                bgMediaElement.sourceNode.connect(audioContext.destination); // Para você ouvir enquanto grava
                
                const audioTracks = dest.stream.getAudioTracks();
                if(audioTracks.length > 0) finalTracks.push(audioTracks[0]);
                
                bgMediaElement.currentTime = 0;
                bgMediaElement.play();
            }

            // Inicia gravador com vídeo + áudio
            const combinedStream = new MediaStream(finalTracks);
            mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm; codecs=vp9' });

            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = salvarVideo;

            mediaRecorder.start();
            drawFrame(performance.now());
        }

        function pararGravacao() {
            cancelAnimationFrame(animationFrameId);
            if (bgMediaElement) { bgMediaElement.pause(); bgMediaElement.currentTime = 0; }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        }

        function salvarVideo() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const isYT = document.querySelector('input[name="format"]:checked').value === 'yt';
            a.download = `zap48_lyrics_${isYT ? 'youtube' : 'canva'}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            
            startBtn.disabled = false;
            startBtn.innerText = "Gravar Vídeo";
        }

        // Inicia com uma linha vazia
        adicionarLinha();
    </script>
</body>
</html>
