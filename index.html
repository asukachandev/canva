<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zap48 Lyrics Studio</title>
    <style>
        :root {
            --zap-green: #25D366;
            --bg-base: #000000;
            --bg-panel: #141414;
            --bg-track: #1e1e1e;
            --bg-hover: #2a2a2a;
            --border-color: #333333;
            --text-main: #f5f5f5;
            --text-dim: #999999;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; /* Evita scroll na página toda, foca nas áreas */
        }

        /* --- 1. ÁREA DO MONITOR (PREVIEW FIXO NO TOPO) --- */
        .monitor-area {
            background-color: #0a0a0a; border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center;
            padding: 10px; z-index: 100;
        }

        .canvas-wrapper {
            position: relative; width: 100%; max-width: 400px; 
            display: flex; justify-content: center;
        }

        canvas {
            background-color: #000; border-radius: 8px;
            max-width: 100%; height: auto; max-height: 40vh;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #222;
        }

        /* Controles do Player estilo Editor */
        .player-bar {
            width: 100%; max-width: 500px; display: flex; align-items: center; gap: 10px;
            margin-top: 10px; padding: 5px 10px; box-sizing: border-box;
        }
        .btn-play { background: transparent; color: var(--text-main); border: none; font-size: 20px; cursor: pointer; padding: 5px; }
        .timeline-slider { flex-grow: 1; accent-color: var(--zap-green); height: 4px; cursor: pointer; }
        .time-display { font-family: monospace; font-size: 12px; color: var(--text-dim); }

        /* --- 2. BARRA DE FERRAMENTAS (MIDDLE) --- */
        .toolbar {
            background: var(--bg-panel); border-bottom: 1px solid var(--border-color);
            padding: 10px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap;
            scrollbar-width: none; /* Firefox */
        }
        .toolbar::-webkit-scrollbar { display: none; } /* Chrome */
        
        .tool-btn {
            background: var(--bg-track); color: var(--text-main); border: 1px solid var(--border-color);
            padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 5px; transition: 0.2s;
        }
        .tool-btn:hover { background: var(--bg-hover); }
        .tool-btn.primary { background: var(--zap-green); color: #000; font-weight: bold; border: none; }
        
        input[type="file"] { display: none; }

        /* --- 3. TIMELINE (CAMADAS/LAYERS) --- */
        .timeline-area {
            flex-grow: 1; overflow-y: auto; background-color: var(--bg-base);
            padding: 10px; padding-bottom: 100px;
        }

        .track-layer {
            background: var(--bg-track); border: 1px solid var(--border-color);
            border-radius: 8px; margin-bottom: 8px; overflow: hidden;
            transition: 0.3s;
        }

        /* Resumo da Camada (Sempre visível) */
        .track-summary {
            display: flex; align-items: center; gap: 10px; padding: 12px;
            cursor: pointer; user-select: none;
        }
        .track-summary:hover { background: var(--bg-hover); }
        
        .track-color-indicator { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .track-time-snippet { font-family: monospace; font-size: 11px; color: var(--zap-green); background: rgba(37, 211, 102, 0.1); padding: 2px 6px; border-radius: 4px; }
        .track-name-snippet { font-size: 13px; font-weight: bold; width: 60px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-text-snippet { font-size: 13px; color: var(--text-dim); flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Editor da Camada (Expansível) */
        .track-editor {
            display: none; padding: 15px; border-top: 1px solid var(--border-color);
            background: #181818; flex-direction: column; gap: 12px;
        }
        .track-layer.active .track-editor { display: flex; }
        .track-layer.active { border-color: var(--zap-green); }

        /* Inputs Internos do Editor */
        .editor-row { display: flex; gap: 10px; align-items: center; }
        .editor-input {
            background: #000; border: 1px solid var(--border-color); color: var(--text-main);
            padding: 8px 10px; border-radius: 4px; font-size: 13px; width: 100%; box-sizing: border-box;
        }
        .editor-input:focus { outline: none; border-color: var(--zap-green); }
        
        .time-box { display: flex; align-items: center; background: #000; border: 1px solid var(--border-color); border-radius: 4px; padding-right: 4px; flex: 1; }
        .time-box input { background: transparent; border: none; color: var(--text-main); padding: 8px; width: 100%; font-family: monospace; font-size: 12px; text-align: center;}
        .time-box input:focus { outline: none; }
        .btn-capture { background: var(--bg-hover); color: var(--text-main); border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-capture:hover { background: var(--zap-green); color: #000; }

        .btn-danger { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 13px;}

        /* Modais Extras (Configurações e Importar) */
        .modal { display: none; background: var(--bg-panel); padding: 15px; border-radius: 8px; margin: 10px; border: 1px solid var(--border-color); }
        .modal.active { display: block; }
        .modal textarea { width: 100%; height: 80px; background: #000; color: #fff; border: 1px solid var(--border-color); border-radius: 4px; padding: 10px; box-sizing: border-box;}
    </style>
</head>
<body>

    <div class="monitor-area">
        <div class="canvas-wrapper">
            <canvas id="videoCanvas" width="1080" height="1920"></canvas>
        </div>
        <div class="player-bar">
            <button class="btn-play" id="mainPlayBtn" onclick="togglePlayMidia()">▶</button>
            <span class="time-display" id="time-current">00:00</span>
            <input type="range" class="timeline-slider" id="audio-seekbar" min="0" max="100" value="0" step="0.1" oninput="seekAudio()">
            <span class="time-display" id="time-total">00:00</span>
        </div>
    </div>

    <div class="toolbar">
        <label class="tool-btn" for="bg-media">🎵 Importar Fundo</label>
        <input type="file" id="bg-media" accept="audio/*, video/*" onchange="carregarMidiaFundo(this)">
        
        <button class="tool-btn" onclick="adicionarCamada()">➕ Add Texto</button>
        <button class="tool-btn" onclick="toggleModal('modal-import')">📋 Colar Letra</button>
        <button class="tool-btn" onclick="toggleModal('modal-config')">⚙️ Formato</button>
        <button class="tool-btn primary" id="startBtn" onclick="iniciarGravacao()">Exportar</button>
    </div>

    <div id="modal-import" class="modal">
        <textarea id="import-text" placeholder="Cole: Sakura: I remember..."></textarea>
        <button class="tool-btn primary" style="margin-top: 10px; width: 100%; justify-content: center;" onclick="importarLetras()">Gerar Camadas</button>
    </div>
    
    <div id="modal-config" class="modal">
        <p style="margin: 0 0 10px 0; font-size: 13px; color: var(--zap-green);">Proporção do Projeto</p>
        <label><input type="radio" name="format" value="canva" checked onchange="atualizarFormato()"> 9:16 (TikTok)</label><br>
        <label><input type="radio" name="format" value="yt" onchange="atualizarFormato()"> 16:9 (YouTube)</label>
        
        <p style="margin: 15px 0 10px 0; font-size: 13px; color: var(--zap-green);">Estilo Visual</p>
        <label><input type="radio" name="estilo" value="avatar" checked> Com Foto/Avatar</label><br>
        <label><input type="radio" name="estilo" value="texto"> Somente Texto</label>
    </div>

    <div class="timeline-area" id="timeline-tracks">
        </div>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const tracksContainer = document.getElementById('timeline-tracks');
        const startBtn = document.getElementById('startBtn');
        
        // Player Controls
        const seekbar = document.getElementById('audio-seekbar');
        const timeCurrentDisp = document.getElementById('time-current');
        const timeTotalDisp = document.getElementById('time-total');
        const mainPlayBtn = document.getElementById('mainPlayBtn');

        let mediaRecorder; let recordedChunks = []; let startTime = null;
        let animationFrameId; let activeLyrics = []; let maxVideoTime = 0;
        let bgMediaElement = null; let audioContext = null; let finalMimeType = 'video/webm';

        // --- SISTEMA DE UI E MODAIS ---
        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('active');
        }

        // Abre uma camada e fecha as outras
        function toggleTrack(summaryElement) {
            const allTracks = document.querySelectorAll('.track-layer');
            const parentTrack = summaryElement.parentElement;
            
            if (parentTrack.classList.contains('active')) {
                parentTrack.classList.remove('active'); // Só fecha
            } else {
                allTracks.forEach(t => t.classList.remove('active')); // Fecha todas
                parentTrack.classList.add('active'); // Abre a clicada
                parentTrack.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function formatarTempoVisual(segundos) {
            if (isNaN(segundos)) return "00:00";
            const min = Math.floor(segundos / 60); const seg = Math.floor(segundos % 60);
            return `${min.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;
        }

        function atualizarFormato() {
            const formato = document.querySelector('input[name="format"]:checked').value;
            canvas.width = (formato === 'yt') ? 1920 : 1080;
            canvas.height = (formato === 'yt') ? 1080 : 1920;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        window.onload = () => { atualizarFormato(); adicionarCamada("Exemplo", "Sua letra aqui..."); };

        // --- MOTOR DE MÍDIA E PLAYER ---
        function carregarMidiaFundo(input) {
            const file = input.files[0]; if (!file) return;
            const isVideo = file.type.startsWith('video');
            if (bgMediaElement) { bgMediaElement.pause(); bgMediaElement.src = ''; }
            
            bgMediaElement = document.createElement(isVideo ? 'video' : 'audio');
            bgMediaElement.src = URL.createObjectURL(file);
            if (isVideo) { bgMediaElement.muted = false; bgMediaElement.playsInline = true; }

            bgMediaElement.onloadedmetadata = () => {
                seekbar.max = bgMediaElement.duration;
                timeTotalDisp.innerText = formatarTempoVisual(bgMediaElement.duration);
                // Força o primeiro frame se for vídeo
                if(isVideo) setTimeout(() => ctx.drawImage(bgMediaElement, 0, 0, canvas.width, canvas.height), 200);
            };

            bgMediaElement.ontimeupdate = () => {
                seekbar.value = bgMediaElement.currentTime;
                timeCurrentDisp.innerText = formatarTempoVisual(bgMediaElement.currentTime);
            };

            bgMediaElement.onplay = () => mainPlayBtn.innerText = "⏸";
            bgMediaElement.onpause = () => mainPlayBtn.innerText = "▶";
            
            // Inicia o loop de preview visual quando carrega a mídia
            if(!animationFrameId) requestAnimationFrame(drawFrameLive);
        }

        function togglePlayMidia() {
            if (!bgMediaElement) return;
            if (bgMediaElement.paused) bgMediaElement.play(); else bgMediaElement.pause();
        }

        function seekAudio() {
            if (!bgMediaElement) return;
            bgMediaElement.currentTime = seekbar.value;
            timeCurrentDisp.innerText = formatarTempoVisual(seekbar.value);
        }

        function capturarTempoAtual(btn, tipo) {
            if (!bgMediaElement) { alert("Importe um fundo primeiro!"); return; }
            const tempoAtual = bgMediaElement.currentTime;
            const min = Math.floor(tempoAtual / 60); const seg = (tempoAtual % 60).toFixed(2);
            const tempoFormatado = `${min.toString().padStart(2, '0')}:${seg.padStart(5, '0')}`;
            
            const track = btn.closest('.track-layer');
            const inputTarget = track.querySelector(tipo === 'start' ? '.input-start' : '.input-end');
            inputTarget.value = tempoFormatado;
            
            atualizarResumoTrack(track); // Atualiza a pílula de tempo externa
        }

        // --- GERENCIAMENTO DE CAMADAS (LAYERS) ---
        function atualizarResumoTrack(track) {
            const color = track.querySelector('.input-color').value;
            const name = track.querySelector('.input-member').value || 'Sem Nome';
            const text = track.querySelector('.input-text').value || '...';
            const start = track.querySelector('.input-start').value || '00:00';
            
            track.querySelector('.track-color-indicator').style.backgroundColor = color;
            track.querySelector('.track-name-snippet').innerText = name;
            track.querySelector('.track-text-snippet').innerText = text;
            track.querySelector('.track-time-snippet').innerText = start;
        }

        function lidarUploadFoto(input) {
            const label = input.previousElementSibling;
            if (input.files[0]) { label.innerText = "🖼️ Imagem OK"; label.style.color = 'var(--zap-green)'; }
        }

        function adicionarCamada(memberStr = '', textStr = '') {
            const layerId = `layer-${Date.now()}`;
            const div = document.createElement('div');
            div.className = 'track-layer active'; // Cria já aberto
            div.innerHTML = `
                <div class="track-summary" onclick="toggleTrack(this)">
                    <div class="track-color-indicator" style="background: #25D366;"></div>
                    <div class="track-time-snippet">00:00</div>
                    <div class="track-name-snippet">${memberStr || 'Nome'}</div>
                    <div class="track-text-snippet">${textStr || 'Letra...'}</div>
                </div>
                
                <div class="track-editor">
                    <div class="editor-row">
                        <input type="color" class="input-color" value="#25D366" oninput="atualizarResumoTrack(this.closest('.track-layer'))" style="width: 40px; height: 35px; padding:0; border:none; border-radius:4px; cursor:pointer;">
                        <input type="text" class="editor-input input-member" placeholder="Cantor/Membro" value="${memberStr}" oninput="atualizarResumoTrack(this.closest('.track-layer'))">
                    </div>
                    
                    <input type="text" class="editor-input input-text" placeholder="Letra da música" value="${textStr}" oninput="atualizarResumoTrack(this.closest('.track-layer'))">
                    
                    <div class="editor-row">
                        <div class="time-box">
                            <input type="text" class="input-start" placeholder="Início (00:00)" oninput="atualizarResumoTrack(this.closest('.track-layer'))">
                            <button class="btn-capture" onclick="capturarTempoAtual(this, 'start')">⏱️</button>
                        </div>
                        <div class="time-box">
                            <input type="text" class="input-end" placeholder="Fim (00:00)">
                            <button class="btn-capture" onclick="capturarTempoAtual(this, 'end')">⏱️</button>
                        </div>
                    </div>
                    
                    <div class="editor-row">
                        <label class="tool-btn" style="flex:1; justify-content:center;" for="file-${layerId}">🖼️ Upload Foto (PNG)</label>
                        <input type="file" id="file-${layerId}" class="input-file" accept="image/png, image/jpeg" onchange="lidarUploadFoto(this)">
                        <button class="btn-danger" style="flex: 0.3;" onclick="this.closest('.track-layer').remove()">Excluir</button>
                    </div>
                </div>
            `;
            
            // Fecha as outras para focar na nova
            document.querySelectorAll('.track-layer').forEach(t => t.classList.remove('active'));
            tracksContainer.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'center' });
            atualizarResumoTrack(div);
        }

        function importarLetras() {
            const text = document.getElementById('import-text').value;
            const linhas = text.split('\n');
            linhas.forEach(linha => {
                if(!linha.trim()) return;
                const partes = linha.split(':');
                if(partes.length >= 2) adicionarCamada(partes[0].trim(), partes.slice(1).join(':').trim());
            });
            document.getElementById('import-text').value = '';
            toggleModal('modal-import');
        }

        // --- SISTEMA DE RENDERIZAÇÃO (CANVAS) ---
        function converterTempoParaMs(tempoString) {
            if (!tempoString) return 0;
            if (!tempoString.includes(':')) return (parseFloat(tempoString) || 0) * 1000;
            const partes = tempoString.split(':');
            return ((parseInt(partes[0], 10) || 0) * 60 + (parseFloat(partes[1]) || 0)) * 1000;
        }

        function carregarImagemDoArquivo(file) {
            return new Promise((resolve) => {
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.onload = e => { const img = new Image(); img.onload = () => resolve(img); img.src = e.target.result; };
                reader.readAsDataURL(file);
            });
        }

        async function prepararLayers() {
            const tracks = document.querySelectorAll('.track-layer');
            const array = []; maxVideoTime = 0;
            for (const track of tracks) {
                const member = track.querySelector('.input-member').value;
                const text = track.querySelector('.input-text').value;
                const start = converterTempoParaMs(track.querySelector('.input-start').value);
                const end = converterTempoParaMs(track.querySelector('.input-end').value);
                if (member && text) {
                    const fotoElement = await carregarImagemDoArquivo(track.querySelector('.input-file').files[0]);
                    array.push({ member, text, color: track.querySelector('.input-color').value, start, end, fotoElement });
                    if (end > maxVideoTime) maxVideoTime = end;
                }
            }
            if(bgMediaElement && bgMediaElement.duration) maxVideoTime = Math.max(maxVideoTime, bgMediaElement.duration * 1000);
            return array;
        }

        // Loop contínuo que roda enquanto o usuário edita/toca (Preview Realtime)
        function drawFrameLive() {
            if(mediaRecorder && mediaRecorder.state === 'recording') return; // Se tiver gravando, o loop de gravação assume
            renderizarCanvas(bgMediaElement ? bgMediaElement.currentTime * 1000 : 0);
            animationFrameId = requestAnimationFrame(drawFrameLive);
        }

        // Função isolada de desenho
        function renderizarCanvas(tempoMs) {
            const isYT = document.querySelector('input[name="format"]:checked').value === 'yt';
            const apenasTexto = document.querySelector('input[name="estilo"]:checked').value === 'texto';

            ctx.fillStyle = '#0b141a'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (bgMediaElement && bgMediaElement.tagName === 'VIDEO') {
                const vidRatio = bgMediaElement.videoWidth / bgMediaElement.videoHeight;
                const canvasRatio = canvas.width / canvas.height;
                let drawW = canvas.width, drawH = canvas.height, drawX = 0, drawY = 0;
                if (canvasRatio > vidRatio) { drawH = canvas.width / vidRatio; drawY = (canvas.height - drawH) / 2; } 
                else { drawW = canvas.height * vidRatio; drawX = (canvas.width - drawW) / 2; }
                ctx.drawImage(bgMediaElement, drawX, drawY, drawW, drawH);
                ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0, canvas.width, canvas.height); // Overlay escuro
            }

            // Pega as letras do DOM direto pro preview não precisar compilar o array toda hora
            const tracks = document.querySelectorAll('.track-layer');
            let linhaAtual = null;
            tracks.forEach(track => {
                const start = converterTempoParaMs(track.querySelector('.input-start').value);
                const end = converterTempoParaMs(track.querySelector('.input-end').value);
                if(tempoMs >= start && tempoMs <= end) {
                    linhaAtual = {
                        member: track.querySelector('.input-member').value,
                        text: track.querySelector('.input-text').value,
                        color: track.querySelector('.input-color').value,
                        // Para o preview live, fotoElement é muito pesado extrair do DOM, ignoramos a foto no scrub se não foi compilado
                    };
                }
            });
            
            // Se tivermos rodando via array (durante gravação), usamos o activeLyrics
            if(activeLyrics.length > 0) {
                const a = activeLyrics.find(l => tempoMs >= l.start && tempoMs <= l.end);
                if(a) linhaAtual = a;
            }

            if (linhaAtual) {
                ctx.shadowColor = "black"; ctx.shadowBlur = 10; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;

                if (apenasTexto) {
                    ctx.textAlign = 'center'; const textX = canvas.width / 2; const nameY = canvas.height / 2 - 40;
                    ctx.fillStyle = linhaAtual.color; ctx.font = 'bold 80px sans-serif'; ctx.fillText(linhaAtual.member, textX, nameY);
                    ctx.fillStyle = '#ffffff'; ctx.font = '60px sans-serif'; ctx.fillText(linhaAtual.text, textX, nameY + 120);
                } else {
                    const targetSize = isYT ? 500 : 600;
                    const targetX = isYT ? 200 : (canvas.width - targetSize) / 2;
                    const targetY = isYT ? (canvas.height - targetSize) / 2 : 400;

                    if (linhaAtual.fotoElement) {
                        const img = linhaAtual.fotoElement; const imgRatio = img.width / img.height;
                        let finalW = targetSize, finalH = targetSize;
                        if (imgRatio > 1) finalH = targetSize / imgRatio; else finalW = targetSize * imgRatio;
                        ctx.drawImage(img, targetX + (targetSize - finalW) / 2, targetY + (targetSize - finalH) / 2, finalW, finalH);
                    } else {
                        ctx.fillStyle = linhaAtual.color; ctx.fillRect(targetX, targetY, targetSize, targetSize); 
                    }

                    ctx.fillStyle = linhaAtual.color; ctx.textAlign = isYT ? 'left' : 'center';
                    const textX = isYT ? targetX + targetSize + 100 : canvas.width / 2;
                    const nameY = isYT ? targetY + 200 : targetY + targetSize + 150;
                    
                    ctx.font = 'bold 80px sans-serif'; ctx.fillText(linhaAtual.member, textX, nameY);
                    ctx.fillStyle = '#ffffff'; ctx.font = '60px sans-serif'; ctx.fillText(linhaAtual.text, textX, isYT ? nameY + 120 : nameY + 100);
                }
                ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
            }
        }

        // --- SISTEMA DE GRAVAÇÃO ---
        function drawFrameRecord(timestamp) {
            if (!startTime) startTime = timestamp;
            const tempoAtual = timestamp - startTime; 
            
            renderizarCanvas(tempoAtual);

            if (tempoAtual > maxVideoTime + 500) { pararGravacao(); return; }
            animationFrameId = requestAnimationFrame(drawFrameRecord);
        }

        async function iniciarGravacao() {
            cancelAnimationFrame(animationFrameId); // Para o preview
            startBtn.disabled = true; startBtn.innerText = "⏳ Processando...";
            
            activeLyrics = await prepararLayers();
            if (activeLyrics.length === 0 && !bgMediaElement) { alert("Timeline vazia!"); resetBtn(); return; }

            recordedChunks = []; startTime = null;
            startBtn.innerText = "🔴 Gravando (Não Saia)...";

            const canvasStream = canvas.captureStream(30);
            let finalTracks = [...canvasStream.getVideoTracks()];

            if (bgMediaElement) {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if(!bgMediaElement.sourceNode) bgMediaElement.sourceNode = audioContext.createMediaElementSource(bgMediaElement);
                
                const dest = audioContext.createMediaStreamDestination();
                bgMediaElement.sourceNode.disconnect();
                bgMediaElement.sourceNode.connect(dest);
                bgMediaElement.sourceNode.connect(audioContext.destination); 
                
                const audioTracks = dest.stream.getAudioTracks();
                if(audioTracks.length > 0) finalTracks.push(audioTracks[0]);
                
                bgMediaElement.currentTime = 0; bgMediaElement.play();
            }

            const combinedStream = new MediaStream(finalTracks);
            if (MediaRecorder.isTypeSupported('video/mp4; codecs="avc1.42E01E, mp4a.40.2"')) { finalMimeType = 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"'; } 
            else if (MediaRecorder.isTypeSupported('video/mp4')) { finalMimeType = 'video/mp4'; } 
            else { finalMimeType = 'video/webm; codecs=vp9'; }

            mediaRecorder = new MediaRecorder(combinedStream, { mimeType: finalMimeType });
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = salvarVideo;

            mediaRecorder.start();
            drawFrameRecord(performance.now());
        }

        function pararGravacao() {
            cancelAnimationFrame(animationFrameId);
            if (bgMediaElement) { bgMediaElement.pause(); bgMediaElement.currentTime = 0; }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        }

        function salvarVideo() {
            const blob = new Blob(recordedChunks, { type: finalMimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url;
            const extensao = finalMimeType.includes('mp4') ? 'mp4' : 'webm';
            a.download = `zap48_export.${extensao}`;
            a.click(); URL.revokeObjectURL(url); resetBtn();
            
            // Volta pro preview
            activeLyrics = [];
            requestAnimationFrame(drawFrameLive);
        }

        function resetBtn() { startBtn.disabled = false; startBtn.innerText = "Exportar"; }
    </script>
</body>
</html>
